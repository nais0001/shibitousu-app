<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>紫微斗数 命盤作成アプリ</title>
  <style>
    /* -----------------------------------------
       💻 パソコン向けの基本レイアウト（横並び）
       ----------------------------------------- */
    .app-layout {
      display: flex;
      flex-direction: row-reverse;
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .main-content {
      flex: 1;
      padding: 20px;
      box-sizing: border-box;
      min-width: 0;
    }

    #sidebar {
      width: 320px;
      min-width: 320px;
      background-color: #f5f5f5;
      padding: 20px;
      box-sizing: border-box;
      border-right: 1px solid #ddd;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .form-group input, .form-group select, #reading-text {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    /* -----------------------------------------
       📱 スマホ向けの画面表示レイアウト（CSS3ズーム縮小方式）
       ----------------------------------------- */
    @media screen and (max-width: 768px) {
      .app-layout {
        display: flex;
        flex-direction: column; /* 確実に縦並びにする */
      }

      #sidebar {
        width: 100%;
        min-width: 100%;
        border-right: none;
        border-bottom: 1px solid #ddd;
        padding: 20px 10px;
        box-sizing: border-box;
      }

      .main-content {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
      }

      /* 💡 JSの描画バグを防ぐため、コンテナの制限を完全に撤廃 */
      #chart-container {
        width: 100%;
        overflow: visible;
        margin-bottom: 20px;
      }
      
      /* 💡 【解決策】JSが想定する「元のサイズ」で一度100%正しく描画させ、
         その後にCSSの `zoom`（または `transform`）を使って、スマホの画面幅に合わせて箱ごと縮小します。
         これによりプログラムの計算が狂わず、確実に命盤が出現します。 */
      #chart {
        display: grid !important; /* JSの元設定を維持 */
        width: 600px !important;  /* JSが計算しやすい元のサイズを保証 */
        zoom: 0.6;                /* 👈 画面幅に合わせて一括で60%に縮小表示（文字も線も全て連動） */
        transform-origin: top left;
        margin: 0 auto !important;
        box-sizing: border-box;
      }

      /* お使いのブラウザがzoom未対応だった場合のフォールバック（Safari対策） */
      @supports not (zoom: 0.6) {
        #chart {
          transform: scale(0.6) !important;
          margin-bottom: -240px !important; /* スケール縮小で生じる下の余白を相殺 */
        }
      }

      #reading-container {
        width: 100%;
        box-sizing: border-box;
        margin-top: 20px;
        padding: 0 5px;
      }

      #reading-text {
        width: 100% !important;
        box-sizing: border-box;
      }
    }

    /* -----------------------------------------
       🖨 印刷専用の完璧なレイアウト
       ----------------------------------------- */
    @media print {
      html, body, .app-layout, .main-content {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        position: static !important;
        overflow: visible !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .no-print, button, #sidebar {
        display: none !important;
      }

      #chart-container {
        display: block !important;
        width: 100% !important;
        page-break-inside: avoid !important;
        page-break-after: always !important; /* 命盤の後で確実に改ページ */
        text-align: center !important;
      }

      /* 印刷時は縮小を解除し、A4横幅いっぱいに綺麗に100%で出す */
      #chart {
        display: grid !important;
        width: 100% !important;
        zoom: 1 !important;
        transform: none !important;
        margin: 0 auto !important;
      }

      #chart * {
        text-align: center !important;
      }

      #reading-container {
        display: block !important;
        width: 100% !important;
        page-break-before: always !important; /* 鑑定書の手前で確実に改ページ */
        position: static !important;
      }

      .print-only-text {
        display: block !important;
        width: 100% !important;
        white-space: pre-wrap !important;
        text-align: left !important;
        font-size: 12pt !important;
        line-height: 1.6 !important;
      }

      textarea {
        display: none !important;
      }
    }
  </style>
</head>
<body>

<div class="app-layout">
  
  <div id="sidebar" class="no-print">
    <h2>命盤データ入力</h2>
    
    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="user-name" value="鑑定ユーザー">
    </div>

    <div class="form-group">
      <label>暦の種類</label>
      <select id="date-type">
        <option value="solar">太陽暦 (新暦)</option>
        <option value="lunar">太陰暦 (旧暦)</option>
      </select>
    </div>

    <div class="form-group">
      <label>誕生日</label>
      <input type="date" id="birth-date">
    </div>

    <div class="form-group">
      <label>出生時間 (時辰)</label>
      <select id="birth-hour">
        <option value="0">子時 (23:00 - 00:59)</option>
        <option value="1">丑時 (01:00 - 02:59)</option>
        <option value="2">寅時 (03:00 - 04:59)</option>
        <option value="3">卯時 (05:00 - 06:59)</option>
        <option value="4">辰時 (07:00 - 08:59)</option>
        <option value="5">巳時 (09:00 - 10:59)</option>
        <option value="6">午時 (11:00 - 12:59)</option>
        <option value="7">未時 (13:00 - 14:59)</option>
        <option value="8">申時 (15:00 - 16:59)</option>
        <option value="9">酉時 (17:00 - 18:59)</option>
        <option value="10">戌時 (19:00 - 20:59)</option>
        <option value="11">亥時 (21:00 - 22:59)</option>
      </select>
    </div>

    <div class="form-group">
      <label>性別</label>
      <select id="user-gender">
        <option value="male" selected>男</option>
        <option value="female">女</option>
      </select>
    </div>

    <button id="btn-submit" style="margin-bottom: 10px; width: 100%;" onclick="setTimeout(() => { document.getElementById('chart-container').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 200)">命盤を作成する</button>
    <button id="btn-print" style="width: 100%; background-color: #4CAF50; color: white;">命盤と鑑定内容を印刷</button>
  </div>

  <div class="main-content">
    <div class="main-content print-unlocked">
      <div id="chart-container">
        <h1>紫微斗数 命盤</h1>
        <div id="chart" class="grid"></div>
      </div>
      
      <div id="reading-container">
        <h3>鑑定書・特記事項</h3>
        <textarea id="reading-text" rows="15"></textarea>
        <div id="print-reading-text" class="print-only-text"></div>
      </div>
    </div>
  </div>

</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
