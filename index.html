<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紫微斗数 命盤作成アプリ</title>
  <style>
    /* -----------------------------------------
       💻 パソコン向けの基本レイアウト（横並び）
       ----------------------------------------- */
    .app-layout {
      display: flex;
      flex-direction: row;
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* 左側：メインコンテンツ（命盤・鑑定書） */
    .main-content {
      flex: 1;
      padding: 20px;
      box-sizing: border-box;
    }

    /* 右側：データ入力サイドバー */
    #sidebar {
      width: 320px;
      min-width: 320px;
      background-color: #f5f5f5;
      padding: 20px;
      box-sizing: border-box;
      border-left: 1px solid #ddd;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .form-group input, .form-group select, #reading-text {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    /* -----------------------------------------
       📱 スマホ向けのレスポンシブ対応（縦並び）
       ----------------------------------------- */
    @media (max-width: 768px) {
      .app-layout {
        flex-direction: column; /* 横並びから「縦並び」に変更 */
      }

      /* 命盤エリアを上に配置し、横幅をいっぱいに広げる */
      .main-content {
        width: 100%;
        order: 1; /* 命盤を最初（上）にする */
        padding: 10px;
      }

      /* 入力パネル（サイドバー）を下に回り込ませる */
      #sidebar {
        width: 100%;
        min-width: 100%;
        order: 2; /* 入力パネルを後（下）にする */
        border-left: none;
        border-top: 1px solid #ddd;
        padding: 20px 10px;
      }

      /* 命盤（グリッド）がスマホ画面からはみ出る場合は横スクロール可能にする防御策 */
      #chart-container {
        width: 100%;
        overflow-x: auto;
      }
      
      #chart {
        min-width: 600px; /* 命盤の形が潰れないよう最小幅を確保（必要に応じて調整） */
      }
    }

    /* 印刷用設定（既存のクラス名維持用） */
    @media print {
      .no-print { display: none !important; }
      .print-only-text { display: block !important; }
    }
  </style>
</head>
<body>

<div class="app-layout">
  
  <div class="main-content">
    <div class="main-content print-unlocked">
      <div id="chart-container">
        <h1>紫微斗数 命盤</h1>
        <div id="chart" class="grid"></div>
      </div>
      
      <div id="reading-container" class="page-break">
        <h3>鑑定書・特記事項</h3>
        <textarea id="reading-text" rows="15"></textarea>
        <div id="print-reading-text" class="print-only-text"></div>
      </div>
    </div>
  </div>

  <div id="sidebar" class="no-print">
    <h2>命盤データ入力</h2>
    
    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="user-name" value="鑑定ユーザー">
    </div>

    <div class="form-group">
      <label>暦の種類</label>
      <select id="date-type">
        <option value="solar">太陽暦 (新暦)</option>
        <option value="lunar">太陰暦 (旧暦)</option>
      </select>
    </div>

    <div class="form-group">
      <label>誕生日</label>
      <input type="date" id="birth-date">
    </div>

    <div class="form-group">
      <label>出生時間 (時辰)</label>
      <select id="birth-hour">
        <option value="0">子時 (23:00 - 00:59)</option>
        <option value="1">丑時 (01:00 - 02:59)</option>
        <option value="2">寅時 (03:00 - 04:59)</option>
        <option value="3">卯時 (05:00 - 06:59)</option>
        <option value="4">辰時 (07:00 - 08:59)</option>
        <option value="5">巳時 (09:00 - 10:59)</option>
        <option value="6">午時 (11:00 - 12:59)</option>
        <option value="7">未時 (13:00 - 14:59)</option>
        <option value="8">申時 (15:00 - 16:59)</option>
        <option value="9">酉時 (17:00 - 18:59)</option>
        <option value="10">戌時 (19:00 - 20:59)</option>
        <option value="11">亥時 (21:00 - 22:59)</option>
      </select>
    </div>

    <div class="form-group">
      <label>性別</label>
      <select id="user-gender">
        <option value="male" selected>男</option>
        <option value="female">女</option>
      </select>
    </div>

    <button id="btn-submit" style="margin-bottom: 10px; width: 100%;">命盤を作成する</button>
    <button id="btn-print" style="width: 100%; background-color: #4CAF50; color: white;">命盤と鑑定内容を印刷</button>
  </div>

</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
