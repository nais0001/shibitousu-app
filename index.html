<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>紫微斗数 命盤作成アプリ</title>
  <style>
    /* =====================================================
       🎨 CSS 変数・ベース
       ===================================================== */
    :root {
      --color-primary: #4CAF50;
      --color-primary-dark: #388E3C;
      --sidebar-width: 320px;
      --topbar-height: 50px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    /* =====================================================
       💻 PC レイアウト（横並び）
       ===================================================== */
    .app-layout {
      display: flex;
      flex-direction: row;
      width: 100%;
      min-height: 100vh;
    }

    .main-content {
      flex: 1;
      padding: 20px;
      min-width: 0;
    }

    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background-color: #f5f5f5;
      padding: 20px;
      border-left: 1px solid #ddd;
    }

    /* モバイル用トグルボタンは PC では非表示 */
    .mobile-menu-toggle {
      display: none;
    }

    /* ---- フォーム共通 ---- */
    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .form-group input,
    .form-group select,
    #reading-text {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    /* ---- 命盤コンテナ（PC） ---- */
    #chart-container {
      text-align: center;
      margin-bottom: 20px;
    }

    /* ---- 鑑定エリア（PC） ---- */
    #reading-container {
      margin-top: 20px;
    }

    #reading-text {
      width: 100%;
    }

    /* 印刷専用テキスト：通常時は非表示 */
    .print-only-text {
      display: none;
    }

    /* =====================================================
       📱 スマホ レイアウト（max-width: 768px）
       ===================================================== */
    @media screen and (max-width: 768px) {

      /* --- レイアウトをブロック化 --- */
      .app-layout {
        display: block;
      }

      .main-content {
        padding: 0;
        padding-top: var(--topbar-height); /* 固定トグルバーの分だけ下げる */
        width: 100%;
      }

      /* --- 固定トグルボタン --- */
      .mobile-menu-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: var(--topbar-height);
        background-color: var(--color-primary);
        color: white;
        font-weight: bold;
        font-size: 15px;
        z-index: 9999;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        cursor: pointer;
        gap: 8px;
        user-select: none;
      }

      /* --- スライドアップ入力パネル --- */
      #sidebar {
        position: fixed !important;
        bottom: -100%;
        left: 0 !important;
        width: 100% !important;
        max-height: 75vh !important;
        overflow-y: auto !important;
        z-index: 9998;
        background-color: #ffffff !important;
        border-left: none;
        border-top: 3px solid var(--color-primary);
        box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        transition: bottom 0.3s ease-in-out;
        padding: 20px;
      }

      #sidebar.active {
        bottom: 0 !important;
      }

      /* --- 命盤コンテナ --- */
      #chart-container {
        width: 100%;
        overflow: hidden;           /* ピンチ時にはみ出さないよう隠す */
        touch-action: none;         /* ブラウザのデフォルトスクロールを抑制してピンチを奪う */
        cursor: grab;
        background: #fafafa;
        margin-bottom: 0;
        text-align: center;
      }

      #chart-container h1 {
        font-size: 18px;
        margin: 10px auto 4px;
        text-align: center;
        pointer-events: none;       /* ドラッグ時にテキスト選択させない */
      }

      /*
        #chart はJSで transform(scale + translate) を直接制御する。
        CSS の固定 scale / margin-bottom は全て削除し、
        JS 側で初期スケールを計算して設定する。
      */
      #chart {
        display: grid;
        width: 600px;               /* 元サイズ固定 */
        /* transform-origin は JS で "0 0" に設定する */
        will-change: transform;
        margin: 0;                  /* JS が panX で中央配置を制御 */
        touch-action: none;
      }

      /* 星の名前：左寄せ */
      #chart .star,
      #chart .main-star,
      #chart .sub-star,
      #chart div[class*="star"] {
        text-align: left !important;
        justify-content: flex-start !important;
        padding-left: 6px !important;
      }

      /* 大限・小限 2行維持 */
      #chart .daigen,
      #chart .shogen,
      #chart .period-text,
      #chart div[class*="daigen"],
      #chart div[class*="shogen"] {
        display: block !important;
        white-space: pre-line !important;
        word-break: break-all !important;
        line-height: 1.3 !important;
      }

      /* --- 鑑定エリア：画面幅いっぱい --- */
      #reading-container {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        margin-top: 8px;
        position: relative;
        z-index: 10;
      }

      #reading-container h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      #reading-text {
        width: 100% !important;
        box-sizing: border-box;
        font-size: 14px;
        line-height: 1.6;
        resize: vertical;
      }

    } /* end @media (max-width: 768px) */

    /* =====================================================
       🖨 印刷レイアウト
       ===================================================== */
    @media print {

      /* スマホ用の transform / negative-margin を完全リセット */
      html, body,
      .app-layout,
      .main-content {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        position: static !important;
        overflow: visible !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      /* 印刷不要な要素を非表示 */
      .no-print,
      button,
      #sidebar,
      .mobile-menu-toggle {
        display: none !important;
      }

      /* 1ページ目：命盤 */
      #chart-container {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        text-align: center !important;
        margin: 0 !important;
        padding: 0 !important;
        page-break-inside: avoid !important;
        page-break-after: always !important; /* 命盤の直後で強制改ページ */
        touch-action: auto !important;
      }

      #chart-container h1 {
        text-align: center !important;
        font-size: 24pt !important;
        margin-bottom: 20px !important;
        pointer-events: auto !important;
      }

      /* 印刷時は元サイズ・transform なし・余白なしに完全リセット */
      #chart {
        display: grid !important;
        width: 100% !important;
        transform: none !important;        /* ピンチ状態の transform を打ち消す */
        transform-origin: unset !important;
        margin: 0 auto !important;
        touch-action: auto !important;
      }

      /* 印刷時も星名は左寄せ */
      #chart .star,
      #chart .main-star,
      #chart .sub-star,
      #chart div[class*="star"] {
        text-align: left !important;
        justify-content: flex-start !important;
        padding-left: 8px !important;
      }

      /* 印刷時も大限・小限 2行 */
      #chart .daigen,
      #chart .shogen,
      #chart .period-text {
        display: block !important;
        white-space: pre-line !important;
      }

      /* 2ページ目：鑑定書 */
      #reading-container {
        display: block !important;
        width: 100% !important;
        page-break-before: always !important; /* 鑑定書は必ず2ページ目から */
        margin: 0 !important;
        padding: 30px 0 0 !important;
        position: static !important;
      }

      #reading-container h3 {
        font-size: 16pt !important;
        margin-bottom: 15px !important;
      }

      /* 印刷時は textarea を非表示にして div で代替 */
      textarea#reading-text {
        display: none !important;
      }

      .print-only-text {
        display: block !important;
        width: 100% !important;
        white-space: pre-wrap !important;
        text-align: left !important;
        font-size: 12pt !important;
        line-height: 1.6 !important;
      }

    } /* end @media print */

  </style>
</head>
<body>

<!-- スマホ用トグルボタン（PC では非表示） -->
<div class="mobile-menu-toggle no-print" id="menu-toggle" onclick="toggleSidebar()">
  👤 条件入力を開く / 閉じる
</div>

<div class="app-layout">

  <!-- ===== メインコンテンツ ===== -->
  <div class="main-content">

    <!-- 命盤エリア -->
    <div id="chart-container">
      <h1>紫微斗数 命盤</h1>
      <div id="chart" class="grid"></div>
    </div>

    <!-- 鑑定書エリア -->
    <div id="reading-container">
      <h3>鑑定書・特記事項</h3>
      <textarea id="reading-text" rows="15"></textarea>
      <!-- 印刷時に textarea の代わりに表示するテキスト -->
      <div id="print-reading-text" class="print-only-text"></div>
    </div>

  </div><!-- /.main-content -->

  <!-- ===== サイドバー（入力パネル） ===== -->
  <div id="sidebar" class="no-print">
    <h2>命盤データ入力</h2>

    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="user-name" value="鑑定ユーザー">
    </div>

    <div class="form-group">
      <label>暦の種類</label>
      <select id="date-type">
        <option value="solar">太陽暦 (新暦)</option>
        <option value="lunar">太陰暦 (旧暦)</option>
      </select>
    </div>

    <div class="form-group">
      <label>誕生日</label>
      <input type="date" id="birth-date">
    </div>

    <div class="form-group">
      <label>出生時間 (時辰)</label>
      <select id="birth-hour">
        <option value="0">子時 (23:00 - 00:59)</option>
        <option value="1">丑時 (01:00 - 02:59)</option>
        <option value="2">寅時 (03:00 - 04:59)</option>
        <option value="3">卯時 (05:00 - 06:59)</option>
        <option value="4">辰時 (07:00 - 08:59)</option>
        <option value="5">巳時 (09:00 - 10:59)</option>
        <option value="6">午時 (11:00 - 12:59)</option>
        <option value="7">未時 (13:00 - 14:59)</option>
        <option value="8">申時 (15:00 - 16:59)</option>
        <option value="9">酉時 (17:00 - 18:59)</option>
        <option value="10">戌時 (19:00 - 20:59)</option>
        <option value="11">亥時 (21:00 - 22:59)</option>
      </select>
    </div>

    <div class="form-group">
      <label>性別</label>
      <select id="user-gender">
        <option value="male" selected>男</option>
        <option value="female">女</option>
      </select>
    </div>

    <button id="btn-submit"
            style="margin-bottom:10px; width:100%;"
            onclick="closeSidebarAndScroll()">
      命盤を作成する
    </button>

    <button id="btn-print"
            style="width:100%; background-color:#4CAF50; color:white;"
            onclick="printChart()">
      命盤と鑑定内容を印刷
    </button>
  </div><!-- /#sidebar -->

</div><!-- /.app-layout -->


<!-- =====================================================
     JavaScript
     ===================================================== -->
<script>
  /* -------------------------------------------------------
     サイドバー 開閉
     ------------------------------------------------------- */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
  }

  function closeSidebarAndScroll() {
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('active');
    }
    setTimeout(() => {
      document.getElementById('chart-container')
        .scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 250);
  }

  /* -------------------------------------------------------
     印刷前処理：textarea の内容を div にコピーしてから印刷
     ------------------------------------------------------- */
  function printChart() {
    const ta  = document.getElementById('reading-text');
    const div = document.getElementById('print-reading-text');

    // textarea の内容を印刷用 div に反映（改行を <br> に変換）
    div.innerHTML = ta.value
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');

    // ピンチズームの transform を印刷前にリセット
    const chart = document.getElementById('chart');
    const savedTransform = chart.style.transform;
    chart.style.transform = 'none';

    window.print();

    // 印刷ダイアログを閉じたあとに元の transform を復元
    chart.style.transform = savedTransform;
  }

  /* -------------------------------------------------------
     命盤 ピンチ & ドラッグ ズーム（スマホ専用）

     座標系の方針：
       ・transform-origin は常に「0 0」（左上）固定
       ・transform = `scale(S) translate(tx, ty)` の順で適用
         → scale 後に translate するので、tx/ty は「スケール前の座標系」の値
         → ピンチ中心を固定するには：
              tx_new = tx_old + midX*(1/newS - 1/oldS)  ではなく
              スケール前座標系で midX/scale を使う計算が必要

       ・実装は「スクリーン座標系で panX/panY を管理し、
         scale は別管理」する Map-Viewer 方式を採用
         transform = `translate(panX px, panY px) scale(S)`
         ただし transform-origin: 0 0 で適用

       ・手を離した後のスナップ：
         scale <= initialScale なら全体表示にアニメーションリセット
         scale > initialScale なら位置固定（移動は保持）
     ------------------------------------------------------- */
  (function initChartPinchZoom() {

    if (window.innerWidth > 768) return;

    const container = document.getElementById('chart-container');
    const chart     = document.getElementById('chart');

    /* ── 定数 ── */
    const CHART_NATURAL_W = 600; // #chart の元の幅(px)
    const MAX_SCALE       = 4.0;
    const SNAP_THRESHOLD  = 0.05; // initialScale との差がこれ以下ならスナップ

    /* ── 状態 ── */
    let S     = 1;   // 現在のスケール
    let panX  = 0;   // translateX (スクリーン px)
    let panY  = 0;   // translateY (スクリーン px)
    let initS = 1;   // 画面幅ピッタリのスケール（基準値）

    /* ── transform-origin を 0 0 に固定 ── */
    chart.style.transformOrigin = '0 0';

    /* ── 初期スケール計算 ── */
    function calcInitS() {
      const w = container.clientWidth || window.innerWidth;
      return Math.min(w / CHART_NATURAL_W, 1);
    }

    /* ── 全体表示（初期状態）に戻す ──
       アニメーション付き（transition を一時的に付与） */
    function resetToFit(animated) {
      if (animated) {
        chart.style.transition = 'transform 0.25s ease';
        setTimeout(() => { chart.style.transition = ''; }, 280);
      }
      initS = calcInitS();
      S     = initS;
      // 水平方向を中央に配置：(コンテナ幅 - 命盤スケール後幅) / 2
      const containerW = container.clientWidth || window.innerWidth;
      panX = (containerW - CHART_NATURAL_W * initS) / 2;
      panY = 0;
      applyTransform();
      updateContainerHeight();
    }

    /* ── transform 適用 ── */
    function applyTransform() {
      chart.style.transform = `translate(${panX}px,${panY}px) scale(${S})`;
    }

    /* ── コンテナ高さ調整（scaled 後の実高さ + h1 + 余白） ── */
    function updateContainerHeight() {
      const h1 = container.querySelector('h1');
      const h1H = h1 ? h1.offsetHeight : 0;
      // chart の元の高さ × スケール = 表示上の高さ
      const chartNaturalH = chart.offsetHeight; // transform 前の高さ
      const scaledH = chartNaturalH * S;
      container.style.height = (h1H + scaledH + 16) + 'px';
    }

    /* ── 初期化 ── */
    function init() {
      resetToFit(false);
    }

    window.addEventListener('load', init);

    // 命盤が動的生成されたとき
    new MutationObserver(() => {
      resetToFit(false);
    }).observe(chart, { childList: true, subtree: false });

    window.addEventListener('resize', () => {
      if (window.innerWidth <= 768) resetToFit(false);
    });

    /* ===================================================
       タッチイベント
       =================================================== */

    /* --- ユーティリティ --- */
    function dist2(t) {
      const dx = t[0].clientX - t[1].clientX;
      const dy = t[0].clientY - t[1].clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }

    // クライアント座標 → コンテナ内座標
    function clientToContainer(cx, cy) {
      const r = container.getBoundingClientRect();
      return { x: cx - r.left, y: cy - r.top };
    }

    /* --- 状態 --- */
    let pinching      = false;
    let pinchDist0    = 0;
    let pinchS0       = 1;
    let pinchPanX0    = 0, pinchPanY0    = 0;
    let pinchMidCX    = 0, pinchMidCY    = 0; // コンテナ内中点（固定）

    let dragging      = false;
    let dragCX0       = 0, dragCY0       = 0;
    let dragPanX0     = 0, dragPanY0     = 0;

    container.addEventListener('touchstart', (e) => {

      if (e.touches.length >= 2) {
        e.preventDefault();
        pinching   = true;
        dragging   = false;
        pinchDist0 = dist2(e.touches);
        pinchS0    = S;
        pinchPanX0 = panX;
        pinchPanY0 = panY;
        // ピンチ開始時の中点（コンテナ内）を固定
        const c1 = clientToContainer(e.touches[0].clientX, e.touches[0].clientY);
        const c2 = clientToContainer(e.touches[1].clientX, e.touches[1].clientY);
        pinchMidCX = (c1.x + c2.x) / 2;
        pinchMidCY = (c1.y + c2.y) / 2;

      } else if (e.touches.length === 1 && !pinching) {
        dragging   = true;
        dragCX0    = e.touches[0].clientX;
        dragCY0    = e.touches[0].clientY;
        dragPanX0  = panX;
        dragPanY0  = panY;
      }

    }, { passive: false });

    container.addEventListener('touchmove', (e) => {

      if (pinching && e.touches.length >= 2) {
        e.preventDefault();

        const d       = dist2(e.touches);
        const rawS    = pinchS0 * (d / pinchDist0);
        const newS    = Math.min(MAX_SCALE, Math.max(initS * 0.5, rawS));

        /*
          ピンチ中点（コンテナ内座標 midCX, midCY）が
          スケール変化の前後で同じ画面位置にあるよう panX/panY を補正。

          transform = translate(panX, panY) scale(S)  (origin = 0 0)
          コンテナ内の点 p が画面上で同じ場所に見えるには：
            p = panX + px * S  (px はコンテンツ座標)
          スケール前後で px が変わらないまま panX だけ変えると：
            pinchMidCX = panX_new + (pinchMidCX - pinchPanX0) / pinchS0 * newS
                       ↑これを解くと：
            panX_new = pinchMidCX - (pinchMidCX - pinchPanX0) / pinchS0 * newS
        */
        panX = pinchMidCX - (pinchMidCX - pinchPanX0) / pinchS0 * newS;
        panY = pinchMidCY - (pinchMidCY - pinchPanY0) / pinchS0 * newS;
        S    = newS;

        applyTransform();
        updateContainerHeight();

      } else if (dragging && e.touches.length === 1) {
        e.preventDefault();
        panX = dragPanX0 + (e.touches[0].clientX - dragCX0);
        panY = dragPanY0 + (e.touches[0].clientY - dragCY0);
        applyTransform();
      }

    }, { passive: false });

    container.addEventListener('touchend', (e) => {

      if (e.touches.length < 2) {
        if (pinching) {
          pinching = false;
          // ── スナップ判定 ──
          // 縮小して initS に近づいた（または下回った）なら全体表示に戻す
          if (S <= initS + SNAP_THRESHOLD) {
            resetToFit(true);
          } else {
            updateContainerHeight();
          }
        }
      }

      if (e.touches.length === 0) {
        dragging = false;
        updateContainerHeight();
      }
    });

    /* ダブルタップで全体表示に戻す */
    let lastTap = 0;
    container.addEventListener('touchend', (e) => {
      if (e.changedTouches.length !== 1) return;
      const now = Date.now();
      if (now - lastTap < 300) resetToFit(true);
      lastTap = now;
    });

  })(); // end initChartPinchZoom

</script>

<!-- アプリ本体 JS -->
<script type="module" src="/src/main.js"></script>
</body>
</html>
