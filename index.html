<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紫微斗数 命盤作成アプリ</title>
  <style>
    /* -----------------------------------------
       💻 パソコン向けの基本レイアウト（横並び）
       ----------------------------------------- */
    .app-layout {
      display: flex;
      flex-direction: row;
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* 左側：メインコンテンツ（命盤・鑑定書） */
    .main-content {
      flex: 1;
      padding: 20px;
      box-sizing: border-box;
      min-width: 0;
    }

    /* 右側：データ入力サイドバー */
    #sidebar {
      width: 320px;
      min-width: 320px;
      background-color: #f5f5f5;
      padding: 20px;
      box-sizing: border-box;
      border-left: 1px solid #ddd;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .form-group input, .form-group select, #reading-text {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    /* -----------------------------------------
       📱 スマホ向けの画面表示レイアウト（縦並び）
       ----------------------------------------- */
    @media screen and (max-width: 768px) {
      .app-layout {
        flex-direction: column;
      }

      .main-content {
        width: 100%;
        order: 1; /* 画面表示時は命盤・鑑定書を上にする */
        padding: 10px;
      }

      #chart-container {
        width: 100%;
        overflow-x: auto;
        margin-bottom: 20px;
      }
      
      #chart {
        min-width: 600px; /* 画面表示時は命盤の縮小を防ぐ */
      }

      #reading-container {
        width: 100%;
        box-sizing: border-box;
        margin-top: 20px;
        padding: 0 5px;
      }

      #reading-text {
        width: 100% !important;
        box-sizing: border-box;
      }

      #sidebar {
        width: 100%;
        min-width: 100%;
        order: 2; /* 画面表示時は入力パネルを下にする */
        border-left: none;
        border-top: 1px solid #ddd;
        padding: 20px 10px;
        box-sizing: border-box;
      }
    }

    /* -----------------------------------------
       🖨 印刷専用の完璧なレイアウト（PC・スマホ共通）
       ----------------------------------------- */
    @media print {
      /* 不要な要素（サイドバーやボタン）を完全に非表示 */
      .no-print, button, #sidebar {
        display: none !important;
      }

      /* 印刷時の全体の歪みをリセットし、縦一列の配置を強制 */
      .app-layout {
        display: block !important;
        width: 100% !important;
        min-height: auto !important;
        background: none !important;
      }

      .main-content {
        display: block !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      /* 命盤を印刷用紙の幅（A4など）にジャストフィットさせ、中央寄せにする */
      #chart-container {
        display: block !important;
        width: 100% !important;
        max-width: 100% !important;
        overflow: visible !important;
        margin: 0 auto 30px auto !important;
        text-align: center !important;
        page-break-inside: avoid; /* 命盤の途中でページが千切れるのを防ぐ */
      }

      /* 命盤のグリッド自体を印刷幅いっぱいに自動伸縮させる */
      #chart {
        width: 100% !important;
        min-width: 0 !important; /* 600px固定を解除して紙幅に合わせる */
        max-width: 100% !important;
        margin: 0 auto !important;
      }

      /* 鑑定書エリアの調整（必ず命盤の下に配置されるように制御） */
      #reading-container {
        display: block !important;
        width: 100% !important;
        margin-top: 40px !important;
        page-break-before: auto !important; /* 基本は連続。溢れたら自然に次ページへ */
      }

      .print-only-text {
        display: block !important;
        width: 100% !important;
        white-space: pre-wrap !important; /* 改行を維持 */
        font-size: 14px !important;
        line-height: 1.6 !important;
      }

      textarea {
        display: none !important; /* 印刷時は入力枠を隠す */
      }
    }
  </style>
</head>
<body>

<div class="app-layout">
  
  <div class="main-content">
    <div class="main-content print-unlocked">
      
      <div id="chart-container">
        <h1>紫微斗数 命盤</h1>
        <div id="chart" class="grid"></div>
      </div>
      
      <div id="reading-container" class="page-break">
        <h3>鑑定書・特記事項</h3>
        <textarea id="reading-text" rows="15"></textarea>
        <div id="print-reading-text" class="print-only-text"></div>
      </div>
      
    </div>
  </div>

  <div id="sidebar" class="no-print">
    <h2>命盤データ入力</h2>
    
    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="user-name" value="鑑定ユーザー">
    </div>

    <div class="form-group">
      <label>暦の種類</label>
      <select id="date-type">
        <option value="solar">太陽暦 (新暦)</option>
        <option value="lunar">太陰暦 (旧暦)</option>
      </select>
    </div>

    <div class="form-group">
      <label>誕生日</label>
      <input type="date" id="birth-date">
    </div>

    <div class="form-group">
      <label>出生時間 (時辰)</label>
      <select id="birth-hour">
        <option value="0">子時 (23:00 - 00:59)</option>
        <option value="1">丑時 (01:00 - 02:59)</option>
        <option value="2">寅時 (03:00 - 04:59)</option>
        <option value="3">卯時 (05:00 - 06:59)</option>
        <option value="4">辰時 (07:00 - 08:59)</option>
        <option value="5">巳時 (09:00 - 10:59)</option>
        <option value="6">午時 (11:00 - 12:59)</option>
        <option value="7">未時 (13:00 - 14:59)</option>
        <option value="8">申時 (15:00 - 16:59)</option>
        <option value="9">酉時 (17:00 - 18:59)</option>
        <option value="10">戌時 (19:00 - 20:59)</option>
        <option value="11">亥時 (21:00 - 22:59)</option>
      </select>
    </div>

    <div class="form-group">
      <label>性別</label>
      <select id="user-gender">
        <option value="male" selected>男</option>
        <option value="female">女</option>
      </select>
    </div>

    <button id="btn-submit" style="margin-bottom: 10px; width: 100%;">命盤を作成する</button>
    <button id="btn-print" style="width: 100%; background-color: #4CAF50; color: white;">命盤と鑑定内容を印刷</button>
  </div>

</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
