<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>紫微斗数 命盤作成アプリ</title>
  <style>
    /* ============================================================
       ベース
    ============================================================ */
    :root {
      --green: #4CAF50;
      --green-dark: #388E3C;
      --bar-h: 50px;
      --sidebar-w: 320px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: sans-serif; }
    .print-only-text { display: none; }

    /* ============================================================
       PC レイアウト
    ============================================================ */
    .app-layout {
      display: flex;
      flex-direction: row;
      width: 100%;
      min-height: 100vh;
    }
    .main-content {
      flex: 1;
      padding: 20px;
      min-width: 0;
    }
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: #f5f5f5;
      padding: 20px;
      border-left: 1px solid #ddd;
    }
    .mobile-menu-toggle { display: none; }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input,
    .form-group select,
    #reading-text {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    #chart-container { text-align: center; margin-bottom: 20px; }
    #reading-container { margin-top: 20px; }
    #reading-text { width: 100%; }

    /* ============================================================
       スマホ（max-width: 768px）
    ============================================================ */
    @media screen and (max-width: 768px) {

      .app-layout { display: block; }

      /* ── トップバー（条件入力ボタン） ── */
      .mobile-menu-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: var(--bar-h);
        background: var(--green);
        color: #fff;
        font-weight: bold;
        font-size: 15px;
        z-index: 9999;
        box-shadow: 0 2px 5px rgba(0,0,0,.2);
        cursor: pointer;
        user-select: none;
      }

      /*
        ── 入力パネル（サイドバー） ──
        ポイント：
        ・bottom: -100% で完全に画面外に退避
        ・active 時は bottom: var(--bar-h) — トップバーの真下にぴったり接する
        ・top は使わない（bottom のみで制御）
      */
      #sidebar {
        position: fixed !important;
        bottom: -100% !important;
        left: 0 !important;
        top: auto !important;
        width: 100% !important;
        max-height: calc(100vh - var(--bar-h)) !important;
        overflow-y: auto !important;
        z-index: 9998;
        background: #fff !important;
        border-left: none !important;
        border-top: 3px solid var(--green) !important;
        box-shadow: 0 -4px 12px rgba(0,0,0,.25) !important;
        transition: bottom 0.3s ease !important;
        padding: 20px !important;
      }
      /* active：トップバーの底辺からスタート → 隙間ゼロ */
      #sidebar.active {
        bottom: calc(100vh - var(--bar-h) - 100%) !important;
        /* = 画面高さ - バー高さ - パネル高さ(max 100vh-bar-h) */
        /* 簡単な書き方は top: var(--bar-h) にするが、
           bottom でアニメーションしているので top も使う */
      }

      .main-content {
        padding: 0;
        padding-top: var(--bar-h);
        width: 100%;
      }

      /* style.css の height:100vh / overflow-y:auto をスマホ用に上書き */
      .app-layout {
        height: auto !important;
        min-height: 100vh;
      }
      .main-content {
        overflow-y: visible !important;
        height: auto !important;
      }

      /* ── 命盤コンテナ ── */
      #chart-container {
        width: 100%;
        overflow: hidden; /* 拡大時のはみ出しを隠す */
        position: relative;
        touch-action: none;
        background: #fafafa;
        margin-bottom: 0;
      }
      #chart-container h1 {
        font-size: 18px;
        margin: 10px 0 4px;
        text-align: center;
        pointer-events: none;
        user-select: none;
      }

      /*
        #chart は JS が transform-origin:0 0 + translate/scale で制御する。
        CSS では幅だけ固定し、それ以外の変形は JS に完全に委ねる。
      */
      #chart {
        display: grid;
        width: 600px;
        margin: 0;
        touch-action: none;
        will-change: transform;
        transform-origin: 0 0; /* JS でも設定するが CSS にも書いておく */
      }

      /* 星の名前：左寄せ */
      #chart .star,
      #chart .main-star,
      #chart .sub-star,
      #chart div[class*="star"] {
        text-align: left !important;
        justify-content: flex-start !important;
        padding-left: 6px !important;
      }
      /* 大限・小限 2行 */
      #chart .daigen,
      #chart .shogen,
      #chart .period-text,
      #chart div[class*="daigen"],
      #chart div[class*="shogen"] {
        display: block !important;
        white-space: pre-line !important;
        word-break: break-all !important;
        line-height: 1.3 !important;
      }

      /* ── 鑑定エリア ── */
      #reading-container {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        position: relative;
        z-index: 10;
      }
      #reading-container h3 { margin: 0 0 8px; font-size: 16px; }
      #reading-text {
        width: 100% !important;
        font-size: 14px;
        line-height: 1.6;
        resize: vertical;
      }

    } /* end @media mobile */

    /* ============================================================
       印刷
    ============================================================ */
    @media print {
      html, body, .app-layout, .main-content {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        position: static !important;
        overflow: visible !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      .no-print, button, #sidebar, .mobile-menu-toggle { display: none !important; }

      #chart-container {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        text-align: center !important;
        margin: 0 !important; padding: 0 !important;
        page-break-inside: avoid !important;
        page-break-after: always !important;
        touch-action: auto !important;
      }
      #chart-container h1 {
        text-align: center !important;
        font-size: 24pt !important;
        margin-bottom: 20px !important;
      }
      #chart {
        display: grid !important;
        width: 100% !important;
        transform: none !important;
        transform-origin: unset !important;
        margin: 0 auto !important;
      }
      #chart .star, #chart .main-star, #chart .sub-star,
      #chart div[class*="star"] {
        text-align: left !important;
        justify-content: flex-start !important;
        padding-left: 8px !important;
      }
      #chart .daigen, #chart .shogen, #chart .period-text {
        display: block !important;
        white-space: pre-line !important;
      }
      #reading-container {
        display: block !important;
        width: 100% !important;
        page-break-before: always !important;
        margin: 0 !important;
        padding: 30px 0 0 !important;
        position: static !important;
      }
      #reading-container h3 { font-size: 16pt !important; margin-bottom: 15px !important; }
      textarea#reading-text { display: none !important; }
      .print-only-text {
        display: block !important;
        width: 100% !important;
        white-space: pre-wrap !important;
        text-align: left !important;
        font-size: 12pt !important;
        line-height: 1.6 !important;
      }
    }
  </style>
</head>
<body>

<div class="mobile-menu-toggle no-print" id="menu-toggle" onclick="toggleSidebar()">
  👤 条件入力を開く / 閉じる
</div>

<div class="app-layout">
  <div class="main-content">
    <div id="chart-container">
      <h1>紫微斗数 命盤</h1>
      <div id="chart" class="grid"></div>
    </div>
    <div id="reading-container">
      <h3>鑑定書・特記事項</h3>
      <textarea id="reading-text" rows="15"></textarea>
      <div id="print-reading-text" class="print-only-text"></div>
    </div>
  </div>

  <div id="sidebar" class="no-print">
    <h2>命盤データ入力</h2>
    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="user-name" value="鑑定ユーザー">
    </div>
    <div class="form-group">
      <label>暦の種類</label>
      <select id="date-type">
        <option value="solar">太陽暦 (新暦)</option>
        <option value="lunar">太陰暦 (旧暦)</option>
      </select>
    </div>
    <div class="form-group">
      <label>誕生日</label>
      <input type="date" id="birth-date">
    </div>
    <div class="form-group">
      <label>出生時間 (時辰)</label>
      <select id="birth-hour">
        <option value="0">子時 (23:00 - 00:59)</option>
        <option value="1">丑時 (01:00 - 02:59)</option>
        <option value="2">寅時 (03:00 - 04:59)</option>
        <option value="3">卯時 (05:00 - 06:59)</option>
        <option value="4">辰時 (07:00 - 08:59)</option>
        <option value="5">巳時 (09:00 - 10:59)</option>
        <option value="6">午時 (11:00 - 12:59)</option>
        <option value="7">未時 (13:00 - 14:59)</option>
        <option value="8">申時 (15:00 - 16:59)</option>
        <option value="9">酉時 (17:00 - 18:59)</option>
        <option value="10">戌時 (19:00 - 20:59)</option>
        <option value="11">亥時 (21:00 - 22:59)</option>
      </select>
    </div>
    <div class="form-group">
      <label>性別</label>
      <select id="user-gender">
        <option value="male" selected>男</option>
        <option value="female">女</option>
      </select>
    </div>
    <button id="btn-submit" style="margin-bottom:10px;width:100%;" onclick="closeSidebarAndScroll()">
      命盤を作成する
    </button>
    <button id="btn-print" style="width:100%;background:#4CAF50;color:#fff;" onclick="printChart()">
      命盤と鑑定内容を印刷
    </button>
  </div>
</div>

<script>
/* ================================================================
   サイドバー 開閉
================================================================ */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('active');
}

function closeSidebarAndScroll() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('active');
  }
  setTimeout(() => {
    document.getElementById('chart-container')
      .scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);
}

/* ================================================================
   印刷
   main.js の beforeprint が gridElement.style.height を消すが、
   それより先に transform:none にして印刷後に復元する。
================================================================ */
function printChart() {
  const ta  = document.getElementById('reading-text');
  const div = document.getElementById('print-reading-text');
  div.innerHTML = ta.value
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');

  const chart   = document.getElementById('chart');
  const savedTf = chart.style.transform;
  const savedH  = chart.style.height;
  // コンテナ高さも印刷用にリセット
  const container = document.getElementById('chart-container');
  const savedCH = container.style.height;

  chart.style.transform = 'none';
  chart.style.height    = '';
  container.style.height = '';

  window.print();

  // 印刷ダイアログを閉じた後に元の状態を復元
  chart.style.transform  = savedTf;
  chart.style.height     = savedH;
  container.style.height = savedCH;
}

/* ================================================================
   入力パネル — サイドバーの active 制御（隙間ゼロ版）

   方針：
     CSS の bottom アニメーションではトップバー直下に置くのが
     難しい（パネル高さが可変のため）ので、
     JS で開くたびに top: BAR_H を直接セットする。
     閉じるときは top をリセットして bottom: -100% に戻す。
================================================================ */
(function fixSidebarGap() {
  const BAR_H = 50; // --bar-h と同値
  const sb    = document.getElementById('sidebar');

  // active クラスのオン/オフを監視して top を動的に設定
  const observer = new MutationObserver(() => {
    if (window.innerWidth > 768) return;
    if (sb.classList.contains('active')) {
      // トップバーの真下にぴったり貼り付け
      sb.style.top    = BAR_H + 'px';
      sb.style.bottom = 'auto';
    } else {
      // 画面外に退避
      sb.style.top    = '';
      sb.style.bottom = '-100%';
    }
  });
  observer.observe(sb, { attributes: true, attributeFilter: ['class'] });
})();

/* ================================================================
   命盤 ピンチズーム & ドラッグ（スマホ専用）

   【座標系】
     transform-origin: 0 0 固定。
     適用する変換: translate(panX px, panY px) scale(S)
     → スクリーン上の座標 = コンテンツ座標 × S + pan

   【全体表示の panX 計算】
     スケール後の命盤幅 = NATURAL_W × initS = コンテナ幅
     なので NATURAL_W × initS = containerW
     → initS = containerW / NATURAL_W
     中央揃えにするには:
       panX_fit = (containerW - NATURAL_W × initS) / 2 = 0
     …実は initS の定義から自動的に 0 になる。
     ただし #chart の CSS width が 600px でも、
     コンテナに padding があったり scrollbar があると
     container.clientWidth < 600 となり左端が揃わない。
     → panX_fit = 0 を使いつつ、
       コンテナに overflow:hidden を付けて幅を確定させる。

   【スナップ判定】
     ピンチ終了時 S <= initS × (1+SNAP) なら全体表示に戻す。
     それ以外はそのまま保持。
================================================================ */
(function initPinchZoom() {

  if (window.innerWidth > 768) return;

  const container = document.getElementById('chart-container');
  const chart     = document.getElementById('chart');

  const MAX_SCALE = 5.0;
  const SNAP      = 0.15;

  let S        = 1;
  let panX     = 0;
  let panY     = 0;
  let initS    = 1;
  let fitted   = false;
  let NATURAL_W = 0; // 命盤の実際の幅（生成後に実測）

  // transform-origin を 0 0 に固定
  chart.style.transformOrigin = '0 0';

  /* ----------------------------------------------------------------
     コンテナ幅の取得
     style.css が .main-content に overflow-y:auto を設定しているため
     getBoundingClientRect() で実幅を取るのが最も正確。
  ---------------------------------------------------------------- */
  function getContainerW() {
    return container.getBoundingClientRect().width || window.innerWidth;
  }

  /* ----------------------------------------------------------------
     命盤の自然幅を実測する
     （style.css の .grid は repeat(4,1fr) で幅が可変のため固定値は使えない）
  ---------------------------------------------------------------- */
  function measureNaturalW() {
    const saved = chart.style.transform;
    chart.style.transform = 'none';
    const w = chart.offsetWidth;
    chart.style.transform = saved;
    return w > 0 ? w : 0;
  }

  function calcInitS() {
    if (!NATURAL_W) return 1;
    return getContainerW() / NATURAL_W;
  }

  /* ----------------------------------------------------------------
     transform 適用
  ---------------------------------------------------------------- */
  function apply() {
    chart.style.transform = `translate(${panX}px,${panY}px) scale(${S})`;
  }

  /* ----------------------------------------------------------------
     コンテナ高さを「表示後の命盤の高さ + h1」に合わせる
     → 鑑定エリアがズレなくなる
  ---------------------------------------------------------------- */
  function updateHeight() {
    const h1 = container.querySelector('h1');
    const h1H = h1 ? h1.offsetHeight + parseInt(getComputedStyle(h1).marginTop) : 0;
    // chart.offsetHeight は transform 前の高さ（CSS の width:600px に対応した高さ）
    const scaledH = chart.offsetHeight * S;
    container.style.height = Math.ceil(h1H + scaledH + 8) + 'px';
  }

  /* ----------------------------------------------------------------
     全体表示にリセット
     NATURAL_W を実測してから initS を計算し、
     panX=0, panY=0 で左端から全幅に収まる。
  ---------------------------------------------------------------- */
  function resetToFit(animate) {
    // 命盤幅を実測（transform を外した状態で）
    const measured = measureNaturalW();
    if (measured > 0) NATURAL_W = measured;
    if (!NATURAL_W) return; // まだ命盤が生成されていない

    initS  = calcInitS();
    S      = initS;
    panX   = 0;
    panY   = 0;
    fitted = true;

    if (animate) {
      chart.style.transition = 'transform 0.22s ease';
      apply();
      updateHeight();
      setTimeout(() => { chart.style.transition = ''; }, 250);
    } else {
      apply();
      updateHeight();
    }
  }

  /* ----------------------------------------------------------------
     初期化
     main.js は appendChild で宮を動的追加するので
     MutationObserver(subtree:true) で確実に捕まえる。
     lastChildCount で「全12宮+中宮=13要素」追加完了を待つ。
  ---------------------------------------------------------------- */
  let lastChildCount = 0;

  function tryInit() {
    const count = chart.children.length;
    // 子要素が増えた & 命盤の高さがある & まだフィットしていない
    if (count > 0 && count !== lastChildCount) {
      lastChildCount = count;
      // 描画反映を待ってから実測・リセット
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (!fitted) resetToFit(false);
        });
      });
    }
  }

  if (document.readyState === 'complete') {
    tryInit();
  } else {
    window.addEventListener('load', tryInit);
  }

  new MutationObserver(tryInit)
    .observe(chart, { childList: true, subtree: false });

  window.addEventListener('resize', () => {
    if (window.innerWidth <= 768) {
      fitted = false;
      resetToFit(false);
    }
  });

  /* ================================================================
     タッチイベント
  ================================================================ */

  function dist(t) {
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // クライアント座標 → コンテンツ座標（transform 前の #chart 内の座標）
  function toContent(clientX, clientY) {
    const r = container.getBoundingClientRect();
    // コンテナ左上基準のスクリーン座標 → コンテンツ座標
    return {
      x: (clientX - r.left - panX) / S,
      y: (clientY - r.top  - panY) / S
    };
  }

  // ピンチ状態
  let pinching = false;
  let pDist0   = 0;
  let pS0      = 1, pPanX0 = 0, pPanY0 = 0;
  let pMidCX   = 0, pMidCY = 0; // コンテンツ座標でのピンチ中心

  // ドラッグ状態
  let dragging   = false;
  let dCX0       = 0, dCY0 = 0;
  let dPanX0     = 0, dPanY0 = 0;

  // ダブルタップ
  let lastTapTime = 0;

  container.addEventListener('touchstart', (e) => {
    if (e.touches.length >= 2) {
      e.preventDefault();
      pinching = true;
      dragging = false;

      pDist0 = dist(e.touches);
      pS0    = S;
      pPanX0 = panX;
      pPanY0 = panY;

      // ピンチ開始時の中点をコンテンツ座標で記録
      const midCX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midCY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const mc = toContent(midCX, midCY);
      pMidCX = mc.x;
      pMidCY = mc.y;

    } else if (e.touches.length === 1 && !pinching) {
      dragging = true;
      dCX0     = e.touches[0].clientX;
      dCY0     = e.touches[0].clientY;
      dPanX0   = panX;
      dPanY0   = panY;
    }
  }, { passive: false });

  container.addEventListener('touchmove', (e) => {
    if (pinching && e.touches.length >= 2) {
      e.preventDefault();

      const d    = dist(e.touches);
      const newS = Math.min(MAX_SCALE, Math.max(initS * 0.5, pS0 * (d / pDist0)));

      /*
        ピンチ中点（コンテンツ座標 pMidCX, pMidCY）が
        スクリーン上で動かないように panX/panY を決める。

        スクリーン上の位置 = コンテンツ座標 × S + pan
        ピンチ開始時のスクリーン上の中点:
          midScreenX = pMidCX × pS0 + pPanX0  （変化しない）
        スケール変更後も同じ位置にしたいので:
          midScreenX = pMidCX × newS + panX_new
          → panX_new = midScreenX - pMidCX × newS
      */
      const midSX = pMidCX * pS0 + pPanX0;
      const midSY = pMidCY * pS0 + pPanY0;
      panX = midSX - pMidCX * newS;
      panY = midSY - pMidCY * newS;
      S    = newS;

      apply();
      updateHeight();

    } else if (dragging && e.touches.length === 1) {
      e.preventDefault();
      panX = dPanX0 + (e.touches[0].clientX - dCX0);
      panY = dPanY0 + (e.touches[0].clientY - dCY0);
      apply();
    }
  }, { passive: false });

  container.addEventListener('touchend', (e) => {

    // ピンチ終了
    if (pinching && e.touches.length < 2) {
      pinching = false;
      // initS に近いスケールまで縮んでいたら全体表示にスナップ
      if (S <= initS * (1 + SNAP)) {
        resetToFit(true);
      } else {
        // 拡大状態はそのまま維持
        updateHeight();
      }
    }

    if (e.touches.length === 0) {
      dragging = false;
      updateHeight();
    }

    // ダブルタップ検出 → 全体表示に戻す
    if (e.changedTouches.length === 1 && !pinching) {
      const now = Date.now();
      if (now - lastTapTime < 300) {
        resetToFit(true);
        lastTapTime = 0; // 連続トリガー防止
      } else {
        lastTapTime = now;
      }
    }
  });

})(); // end initPinchZoom
</script>

<script type="module" src="/src/main.js"></script>
</body>
</html>
