<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>紫微斗数 命盤作成アプリ</title>
  <style>
    /* -----------------------------------------
       💻 パソコン向けの基本レイアウト（横並び・元通り）
       ----------------------------------------- */
    .app-layout {
      display: flex;
      flex-direction: row; /* 元の「左：命盤、右：入力」に完全固定 */
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* 左側：メインコンテンツ */
    .main-content {
      flex: 1;
      padding: 20px;
      box-sizing: border-box;
      min-width: 0;
    }

    /* 右側：データ入力サイドバー */
    #sidebar {
      width: 320px;
      min-width: 320px;
      background-color: #f5f5f5;
      padding: 20px;
      box-sizing: border-box;
      border-left: 1px solid #ddd;
    }

    /* スマホ専用の「条件入力ボタン」はPCでは完全に隠す */
    .mobile-menu-toggle {
      display: none;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .form-group input, .form-group select, #reading-text {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    /* -----------------------------------------
       📱 スマホ向けの画面表示レイアウト（開閉ポップアップ式）
       ----------------------------------------- */
    @media screen and (max-width: 768px) {
      .app-layout {
        display: block;
        width: 100%;
      }

      .main-content {
        width: 100%;
        padding: 10px;
        padding-top: 60px; /* 👈 上部固定ボタンのぶん余白を空ける */
        box-sizing: border-box;
      }

      /* スマホ時に最上部に固定表示される「条件入力ボタン」 */
      .mobile-menu-toggle {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 50px;
        background-color: #4CAF50;
        color: white;
        text-align: center;
        line-height: 50px;
        font-weight: bold;
        z-index: 9999; /* 最前面に固定 */
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        cursor: pointer;
      }

      /* 💡 入力パネルを「普段は画面外に隠れ、ボタンを押すと下からスッと出てくる」方式に */
      #sidebar {
        position: fixed !important;
        bottom: -100%; /* 普段は画面の下に完全に隠す */
        left: 0 !important;
        width: 100% !important;
        max-height: 80vh !important; /* 画面の8割までの高さに制限 */
        overflow-y: auto !important; /* パネル内をスクロール可能に */
        z-index: 9998;
        background-color: #ffffff !important;
        border-left: none;
        border-top: 3px solid #4CAF50;
        box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        transition: bottom 0.3s ease-in-out; /* 動くアニメーション */
        padding: 20px;
      }

      /* 💡 ボタンが押されてクラスがついた時だけ、画面内に出現させる */
      #sidebar.active {
        bottom: 0 !important;
      }

      /* 命盤コンテナの縮小調整 */
      #chart-container {
        width: 100%;
        overflow-x: auto;
        margin-bottom: 20px;
      }
      
      /* JSの等倍描画を崩さず、はみ出さないようにスクロールまたは縮小 */
      #chart {
        min-width: 600px; /* JS本来のサイズを維持してエラーを防止 */
      }

      #reading-container {
        width: 100%;
        box-sizing: border-box;
        margin-top: 20px;
      }

      #reading-text {
        width: 100% !important;
        box-sizing: border-box;
      }
    }

    /* -----------------------------------------
       🖨 印刷専用のレイアウト
       ----------------------------------------- */
    @media print {
      html, body, .app-layout, .main-content {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        position: static !important;
        overflow: visible !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .no-print, button, #sidebar, .mobile-menu-toggle {
        display: none !important;
      }

      #chart-container {
        display: block !important;
        width: 100% !important;
        page-break-inside: avoid !important;
        page-break-after: always !important;
        text-align: center !important;
      }

      #chart {
        display: grid !important;
        width: 100% !important;
        min-width: 0 !important;
        margin: 0 auto !important;
      }

      #chart * {
        text-align: center !important;
      }

      #reading-container {
        display: block !important;
        width: 100% !important;
        page-break-before: always !important;
        position: static !important;
      }

      .print-only-text {
        display: block !important;
        width: 100% !important;
        white-space: pre-wrap !important;
        text-align: left !important;
        font-size: 12pt !important;
        line-height: 1.6 !important;
      }

      textarea {
        display: none !important;
      }
    }
  </style>
</head>
<body>

<div class="mobile-menu-toggle" id="menu-toggle" onclick="toggleSidebar()">👤 条件入力を開く / 閉じる</div>

<div class="app-layout">
  
  <div class="main-content">
    <div class="main-content print-unlocked">
      <div id="chart-container">
        <h1>紫微斗数 命盤</h1>
        <div id="chart" class="grid"></div>
      </div>
      
      <div id="reading-container">
        <h3>鑑定書・特記事項</h3>
        <textarea id="reading-text" rows="15"></textarea>
        <div id="print-reading-text" class="print-only-text"></div>
      </div>
    </div>
  </div>

  <div id="sidebar" class="no-print">
    <h2 class="no-print">命盤データ入力</h2>
    
    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="user-name" value="鑑定ユーザー">
    </div>

    <div class="form-group">
      <label>暦の種類</label>
      <select id="date-type">
        <option value="solar">太陽暦 (新暦)</option>
        <option value="lunar">太陰暦 (旧暦)</option>
      </select>
    </div>

    <div class="form-group">
      <label>誕生日</label>
      <input type="date" id="birth-date">
    </div>

    <div class="form-group">
      <label>出生時間 (時辰)</label>
      <select id="birth-hour">
        <option value="0">子時 (23:00 - 00:59)</option>
        <option value="1">丑時 (01:00 - 02:59)</option>
        <option value="2">寅時 (03:00 - 04:59)</option>
        <option value="3">卯時 (05:00 - 06:59)</option>
        <option value="4">辰時 (07:00 - 08:59)</option>
        <option value="5">巳時 (09:00 - 10:59)</option>
        <option value="6">午時 (11:00 - 12:59)</option>
        <option value="7">未時 (13:00 - 14:59)</option>
        <option value="8">申時 (15:00 - 16:59)</option>
        <option value="9">酉時 (17:00 - 18:59)</option>
        <option value="10">戌時 (19:00 - 20:59)</option>
        <option value="11">亥時 (21:00 - 22:59)</option>
      </select>
    </div>

    <div class="form-group">
      <label>性別</label>
      <select id="user-gender">
        <option value="male" selected>男</option>
        <option value="female">女</option>
      </select>
    </div>

    <button id="btn-submit" style="margin-bottom: 10px; width: 100%;" onclick="closeSidebarAndScroll()">命盤を作成する</button>
    <button id="btn-print" style="width: 100%; background-color: #4CAF50; color: white;">命盤と鑑定内容を印刷</button>
  </div>

</div>

<script>
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('active');
  }

  function closeSidebarAndScroll() {
    // スマホの時だけパネルを閉じる
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('active');
    }
    // 命盤までスクロール
    setTimeout(() => {
      document.getElementById('chart-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 250);
  }
</script>

<script type="module" src="/src/main.js"></script>
</body>
</html>
