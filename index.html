<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>紫微斗数 命盤作成アプリ</title>

<style>

/* =====================================================
   PC
===================================================== */

html, body {
  margin: 0;
  padding: 0;
}

.app-layout {
  display: flex;
  min-height: 100vh;
}

.main-content {
  flex: 1;
  padding: 20px;
  box-sizing: border-box;
  min-width: 0;
}

#sidebar {
  width: 320px;
  min-width: 320px;
  background: #f5f5f5;
  padding: 20px;
  box-sizing: border-box;
  border-left: 1px solid #ddd;
}

#sidebar h2 {
  margin-top: 0;
}

.mobile-menu-toggle {
  display: none;
}

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}

.form-group input,
.form-group select,
#reading-text {
  width: 100%;
  padding: 8px;
  box-sizing: border-box;
}

button {
  padding: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  border-radius: 4px;
}

.print-only-text {
  display: none;
}

.init-hidden-mobile {
  display: block;
}

/* =====================================================
   PC命盤
===================================================== */

#chart-container {
  width: 100%;
  overflow: auto;
  text-align: center;
}

#chart {
  display: grid;
  margin: 0 auto;
}

/* =====================================================
   スマホ
===================================================== */

@media screen and (max-width: 768px) {

  .app-layout {
    display: block;
  }

  .main-content {
    padding: 0;
  }

  /* 上部ボタン */

  .mobile-menu-toggle {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 50px;

    background: #4CAF50;
    color: white;

    line-height: 50px;
    text-align: center;
    font-weight: bold;

    z-index: 9999;
  }

  /* サイドバー */

  #sidebar {
    position: fixed !important;

    top: -100vh;
    left: 0;

    width: 100% !important;

    max-height: calc(100vh - 50px);

    overflow-y: auto;

    background: white;

    z-index: 9998;

    border: none;

    padding: 15px !important;

    transition: top 0.3s ease;
  }

  #sidebar.active {
    top: 50px;
  }

  #sidebar h2 {
    display: none;
  }

  /* =====================================================
     命盤コンテナ（縦長）
  ===================================================== */

  #chart-container {

    width: 100% !important;

    height: calc(100vh - 55px) !important;

    margin: 55px auto 0 auto !important;

    overflow: hidden !important;

    position: relative !important;

    display: flex !important;
    justify-content: center !important;
    align-items: center !important;

    background: #fcfcfc;

    box-sizing: border-box;
  }

  /* タイトル */

  #chart-container h1 {
    position: absolute;
    top: 0;
    left: 0;

    width: 100%;

    margin: 0;

    padding: 8px 0;

    font-size: 15px;

    background: rgba(255,255,255,0.9);

    z-index: 10;
  }

  /* =====================================================
     命盤本体
  ===================================================== */

  #chart {

    display: grid !important;

    width: max-content !important;

    min-width: unset !important;

    margin: 0 !important;

    position: relative !important;

    transform-origin: top left !important;

    will-change: transform;
  }

  /* 星名 */

  #chart .star,
  #chart .main-star,
  #chart .sub-star,
  #chart div[class*="star"] {

    text-align: left !important;

    justify-content: flex-start !important;

    padding-left: 4px !important;
  }

  /* 大限小限 */

  #chart .daigen,
  #chart .shogen,
  #chart .period-text {

    white-space: pre-line !important;

    line-height: 1.2 !important;
  }

  /* 鑑定書 */

  #reading-container {

    width: 98% !important;

    margin: 15px auto 30px auto !important;
  }

  #reading-text {
    width: 100%;
    box-sizing: border-box;
  }

  /* 初期非表示 */

  .init-hidden-mobile {
    display: none !important;
  }
}

/* =====================================================
   印刷
===================================================== */

@media print {

  .no-print,
  button,
  #sidebar,
  .mobile-menu-toggle {
    display: none !important;
  }

  #chart-container {

    width: 100% !important;

    overflow: visible !important;

    page-break-after: always !important;

    text-align: center;
  }

  #chart {

    transform: none !important;

    position: static !important;

    margin: 0 auto !important;
  }

  #reading-container {

    page-break-before: always !important;
  }

  textarea {
    display: none !important;
  }

  .print-only-text {
    display: block !important;
    white-space: pre-wrap !important;
  }
}

</style>
</head>

<body>

<!-- =====================================================
     スマホメニュー
===================================================== -->

<div class="mobile-menu-toggle no-print"
     onclick="toggleSidebar()">

  👤 条件入力を開く / 閉じる

</div>

<div class="app-layout">

  <!-- =====================================================
       メイン
  ===================================================== -->

  <div class="main-content">

    <div id="chart-container"
         class="init-hidden-mobile">

      <h1>紫微斗数 命盤</h1>

      <div id="chart"></div>

    </div>

    <div id="reading-container"
         class="init-hidden-mobile">

      <h3>鑑定書・特記事項</h3>

      <textarea id="reading-text"
                rows="15"></textarea>

      <div id="print-reading-text"
           class="print-only-text"></div>

    </div>
  </div>

  <!-- =====================================================
       サイドバー
  ===================================================== -->

  <div id="sidebar"
       class="no-print">

    <h2>命盤データ入力</h2>

    <div class="form-group">
      <label>お名前</label>
      <input type="text"
             id="user-name"
             value="鑑定ユーザー">
    </div>

    <div class="form-group">
      <label>暦の種類</label>

      <select id="date-type">
        <option value="solar">太陽暦</option>
        <option value="lunar">太陰暦</option>
      </select>
    </div>

    <div class="form-group">
      <label>誕生日</label>

      <input type="date"
             id="birth-date">
    </div>

    <div class="form-group">
      <label>出生時間</label>

      <select id="birth-hour">

        <option value="0">子時</option>
        <option value="1">丑時</option>
        <option value="2">寅時</option>
        <option value="3">卯時</option>
        <option value="4">辰時</option>
        <option value="5">巳時</option>
        <option value="6">午時</option>
        <option value="7">未時</option>
        <option value="8">申時</option>
        <option value="9">酉時</option>
        <option value="10">戌時</option>
        <option value="11">亥時</option>

      </select>
    </div>

    <div class="form-group">
      <label>性別</label>

      <select id="user-gender">
        <option value="male">男</option>
        <option value="female">女</option>
      </select>
    </div>

    <button style="width:100%; margin-bottom:10px;"
            onclick="closeSidebarAndScroll()">

      命盤を作成する

    </button>

    <button style="
            width:100%;
            background:#4CAF50;
            color:white;"
            onclick="printChart()">

      命盤と鑑定内容を印刷

    </button>

  </div>
</div>

<!-- =====================================================
     JS
===================================================== -->

<script>

/* =====================================================
   サイドバー
===================================================== */

function toggleSidebar() {

  document.getElementById('sidebar')
    .classList.toggle('active');
}

/* =====================================================
   作成後表示
===================================================== */

function closeSidebarAndScroll() {

  if (window.innerWidth <= 768) {

    document.getElementById('sidebar')
      .classList.remove('active');
  }

  document.querySelectorAll('.init-hidden-mobile')
    .forEach(el => {

      el.style.setProperty(
        'display',
        'block',
        'important'
      );
    });

  if (window.triggerInitChartView) {

    setTimeout(() => {

      window.triggerInitChartView();

    }, 300);
  }

  setTimeout(() => {

    document.getElementById('chart-container')
      .scrollIntoView({
        behavior: 'smooth'
      });

  }, 350);
}

/* =====================================================
   印刷
===================================================== */

function printChart() {

  const ta =
    document.getElementById('reading-text');

  const div =
    document.getElementById('print-reading-text');

  div.innerHTML =
    ta.value.replace(/\n/g, '<br>');

  window.print();
}

/* =====================================================
   スマホ命盤ビュー
===================================================== */

(function() {

  const container =
    document.getElementById('chart-container');

  const chart =
    document.getElementById('chart');

  let baseScale = 1;

  let scale = 1;

  let panX = 0;
  let panY = 0;

  let isDragging = false;

  let startX = 0;
  let startY = 0;

  let startTouchDistance = 0;

  /* =====================================================
     初期配置
  ===================================================== */

  function initChartView() {

    if (window.innerWidth > 768) {

      chart.style.transform = 'none';

      return;
    }

    const containerWidth =
      container.clientWidth;

    const containerHeight =
      container.clientHeight;

    const chartWidth =
      chart.scrollWidth;

    const chartHeight =
      chart.scrollHeight;

    /* 命盤未生成 */

    if (
      chartWidth === 0 ||
      chartHeight === 0
    ) {
      return;
    }

    /* 全体フィット */

    baseScale = Math.min(
      containerWidth / chartWidth,
      containerHeight / chartHeight
    );

    scale = baseScale;

    /* 中央配置 */

    panX =
      (containerWidth -
       chartWidth * scale) / 2 / scale;

    panY =
      (containerHeight -
       chartHeight * scale) / 2 / scale;

    applyTransform();
  }

  window.triggerInitChartView =
    initChartView;

  /* =====================================================
     transform適用
  ===================================================== */

  function applyTransform() {

    chart.style.transform =
      `translate(${panX * scale}px,
                 ${panY * scale}px)
       scale(${scale})`;
  }

  /* =====================================================
     タッチ開始
  ===================================================== */

  container.addEventListener(
    'touchstart',
    function(e) {

      if (window.innerWidth > 768)
        return;

      if (e.touches.length === 1) {

        isDragging = true;

        startX =
          e.touches[0].clientX / scale - panX;

        startY =
          e.touches[0].clientY / scale - panY;
      }

      else if (e.touches.length === 2) {

        isDragging = false;

        startTouchDistance =
          Math.hypot(

            e.touches[0].clientX -
            e.touches[1].clientX,

            e.touches[0].clientY -
            e.touches[1].clientY
          );
      }
    },

    { passive:true }
  );

  /* =====================================================
     タッチ移動
  ===================================================== */

  container.addEventListener(
    'touchmove',
    function(e) {

      if (window.innerWidth > 768)
        return;

      /* ドラッグ */

      if (
        e.touches.length === 1 &&
        isDragging
      ) {

        panX =
          e.touches[0].clientX / scale - startX;

        panY =
          e.touches[0].clientY / scale - startY;

        applyTransform();
      }

      /* ピンチ */

      else if (e.touches.length === 2) {

        const currentDistance =
          Math.hypot(

            e.touches[0].clientX -
            e.touches[1].clientX,

            e.touches[0].clientY -
            e.touches[1].clientY
          );

        if (startTouchDistance > 0) {

          const factor =
            currentDistance /
            startTouchDistance;

          scale = Math.min(
            Math.max(
              baseScale * 0.8,
              scale * factor
            ),
            baseScale * 4
          );

          startTouchDistance =
            currentDistance;

          applyTransform();
        }
      }
    },

    { passive:true }
  );

  /* =====================================================
     タッチ終了
  ===================================================== */

  container.addEventListener(
    'touchend',
    function() {

      isDragging = false;

      startTouchDistance = 0;
    }
  );

  /* =====================================================
     resize
  ===================================================== */

  window.addEventListener(
    'resize',
    initChartView
  );

  /* =====================================================
     命盤生成監視
  ===================================================== */

  const observer =
    new MutationObserver(function() {

      if (chart.children.length > 0) {

        setTimeout(
          initChartView,
          100
        );
      }
    });

  observer.observe(
    chart,
    { childList:true }
  );

})();
</script>

<!-- main.js -->

<script type="module"
        src="/src/main.js"></script>

</body>
</html>
