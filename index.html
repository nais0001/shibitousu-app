<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>紫微斗数 命盤作成アプリ</title>
  <style>
    /* -----------------------------------------
       💻 パソコン向けの基本レイアウト（横並び）
       ----------------------------------------- */
    .app-layout {
      display: flex;
      flex-direction: row;
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .main-content {
      flex: 1;
      padding: 20px;
      box-sizing: border-box;
      min-width: 0;
    }

    #sidebar {
      width: 320px;
      min-width: 320px;
      background-color: #f5f5f5;
      padding: 20px;
      box-sizing: border-box;
      border-left: 1px solid #ddd;
    }

    .mobile-menu-toggle {
      display: none;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .form-group input, .form-group select, #reading-text {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    /* -----------------------------------------
       📱 スマホ向けの画面表示レイアウト
       ----------------------------------------- */
    @media screen and (max-width: 768px) {
      .app-layout {
        display: block;
        width: 100%;
      }

      .main-content {
        width: 100%;
        padding: 10px;
        padding-top: 60px; /* 上部固定ボタンの余白 */
        box-sizing: border-box;
      }

      /* スマホ時に最上部に固定表示される「条件入力ボタン」 */
      .mobile-menu-toggle {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 50px;
        background-color: #4CAF50;
        color: white;
        text-align: center;
        line-height: 50px;
        font-weight: bold;
        z-index: 9999;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        cursor: pointer;
      }

      /* 開閉式入力パネル：普段は完全に画面下（-100%）に退避させ、命盤を隠さない */
      #sidebar {
        position: fixed !important;
        bottom: -100%;
        left: 0 !important;
        width: 100% !important;
        max-height: 75vh !important;
        overflow-y: auto !important;
        z-index: 9998;
        background-color: #ffffff !important;
        border-left: none;
        border-top: 3px solid #4CAF50;
        box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        transition: bottom 0.3s ease-in-out;
        padding: 20px;
      }

      #sidebar.active {
        bottom: 0 !important; /* ボタン押下時のみせり上がる */
      }

      /* 命盤を囲む外箱：タイトルも含めて中央配置 */
      #chart-container {
        width: 100% !important;
        max-width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        text-align: center !important;
      }

      /* 💡 命盤タイトルも縮小要素（#chart）の真上中央になるよう配置調整 */
      #chart-container h1 {
        font-size: 20px;
        margin: 10px auto !important;
        text-align: center !important;
        width: 100%;
      }
      
      /* スケール縮小と透明余白の相殺 */
      #chart {
        width: 600px !important; 
        transform: scale(0.53) !important; 
        transform-origin: center top !important; 
        margin: 0 auto !important;
        display: grid !important;
        margin-bottom: -260px !important; 
      }

      /* 💡 【ご要望】命盤中の星の名前を左寄せにする上書き設定 */
      #chart .star, 
      #chart .main-star, 
      #chart .sub-star, 
      #chart div[class*="star"] {
        text-align: left !important;
        justify-content: flex-start !important;
        padding-left: 4px !important;
      }

      /* 💡 【ご要望】大限、小限のテキストを2行（縦並び）に強制変更 */
      #chart .daigen, 
      #chart .shogen,
      #chart .period-text {
        display: block !important;
        white-space: pre-line !important;
        word-break: break-all !important;
        line-height: 1.2 !important;
      }

      /* 鑑定書エリア */
      #reading-container {
        width: 100%;
        box-sizing: border-box;
        margin-top: 20px !important;
        position: relative;
        z-index: 10;
      }

      #reading-text {
        width: 100% !important;
        box-sizing: border-box;
      }
    }

    /* -----------------------------------------
       🖨 印刷専用のレイアウト（スマホ印刷バグ完全駆除）
       ----------------------------------------- */
    @media print {
      /* スマホ用の絶対配置や画面縮小の影響を「完全にリセット」して標準のA4印刷に戻す */
      html, body, .app-layout, .main-content {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        position: static !important;
        overflow: visible !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      /* 不要パーツの非表示 */
      .no-print, button, #sidebar, .mobile-menu-toggle {
        display: none !important;
      }

      /* 命盤ブロック：1ページ目にクッキリ収め、次のコンテンツの押し出しを確定 */
      #chart-container {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        page-break-inside: avoid !important; /* 命盤自体のページ分断を禁止 */
        page-break-after: always !important; /* 👈 命盤が出た直後に【強制改ページ】 */
        text-align: center !important;
        margin-bottom: 0 !important;
        padding-bottom: 0 !important;
      }

      /* 印刷時はスマホのscale縮小を100%解除し、綺麗な等倍グリッドへ */
      #chart {
        display: grid !important;
        width: 100% !important;
        transform: none !important;
        margin: 0 auto !important;
        margin-bottom: 0 !important;
      }

      /* 印刷時の文字配置：お好みに合わせて中央に綺麗に整列 */
      #chart * {
        text-align: center !important;
      }

      /* 💡 鑑定書エリア：命盤との重なりを100%回避し、2ページ目のド頭から配置 */
      #reading-container {
        display: block !important;
        width: 100% !important;
        page-break-before: always !important; /* 👈 鑑定書が始まる直前に【強制改ページ】 */
        margin-top: 0 !important;
        padding-top: 20px !important;
        position: static !important;
      }

      .print-only-text {
        display: block !important;
        width: 100% !important;
        white-space: pre-wrap !important;
        text-align: left !important;
        font-size: 12pt !important;
        line-height: 1.6 !important;
      }

      textarea {
        display: none !important;
      }
    }
  </style>
</head>
<body>

<div class="mobile-menu-toggle" id="menu-toggle" onclick="toggleSidebar()">👤 条件入力を開く / 閉じる</div>

<div class="app-layout">
  
  <div class="main-content">
    <div class="main-content print-unlocked">
      <div id="chart-container">
        <h1>紫微斗数 命盤</h1>
        <div id="chart" class="grid"></div>
      </div>
      
      <div id="reading-container">
        <h3>鑑定書・特記事項</h3>
        <textarea id="reading-text" rows="15"></textarea>
        <div id="print-reading-text" class="print-only-text"></div>
      </div>
    </div>
  </div>

  <div id="sidebar" class="no-print">
    <h2 class="no-print">命盤データ入力</h2>
    
    <div class="form-group">
      <label>お名前</label>
      <input type="text" id="user-name" value="鑑定ユーザー">
    </div>

    <div class="form-group">
      <label>暦の種類</label>
      <select id="date-type">
        <option value="solar">太陽暦 (新暦)</option>
        <option value="lunar">太陰暦 (旧暦)</option>
      </select>
    </div>

    <div class="form-group">
      <label>誕生日</label>
      <input type="date" id="birth-date">
    </div>

    <div class="form-group">
      <label>出生時間 (時辰)</label>
      <select id="birth-hour">
        <option value="0">子時 (23:00 - 00:59)</option>
        <option value="1">丑時 (01:00 - 02:59)</option>
        <option value="2">寅時 (03:00 - 04:59)</option>
        <option value="3">卯時 (05:00 - 06:59)</option>
        <option value="4">辰時 (07:00 - 08:59)</option>
        <option value="5">巳時 (09:00 - 10:59)</option>
        <option value="6">午時 (11:00 - 12:59)</option>
        <option value="7">未時 (13:00 - 14:59)</option>
        <option value="8">申時 (15:00 - 16:59)</option>
        <option value="9">酉時 (17:00 - 18:59)</option>
        <option value="10">戌時 (19:00 - 20:59)</option>
        <option value="11">亥時 (21:00 - 22:59)</option>
      </select>
    </div>

    <div class="form-group">
      <label>性別</label>
      <select id="user-gender">
        <option value="male" selected>男</option>
        <option value="female">女</option>
      </select>
    </div>

    <button id="btn-submit" style="margin-bottom: 10px; width: 100%;" onclick="closeSidebarAndScroll()">命盤を作成する</button>
    <button id="btn-print" style="width: 100%; background-color: #4CAF50; color: white;">命盤と鑑定内容を印刷</button>
  </div>

</div>

<script>
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('active');
  }

  function closeSidebarAndScroll() {
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('active');
    }
    setTimeout(() => {
      document.getElementById('chart-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 250);
  }
</script>

<script type="module" src="/src/main.js"></script>
</body>
</html>
